<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A collaborative pixel art canvas experiment">
  <meta name="theme-color" content="#222222">
  
  <title>PLACE - Collaborative Pixel Canvas</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Preconnect to backend for faster connections -->
  <link rel="preconnect" href="https://place-backend-lpwc.onrender.com">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <h1>PLACE</h1>
      <p>Loading canvas...</p>
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
    </div>
  </div>

  <!-- Main Container -->
  <div id="app" class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">PLACE</h1>
        <div class="username-input-container">
          <input 
            type="text" 
            id="username-input" 
            class="username-input" 
            placeholder="Enter username"
            maxlength="20"
            autocomplete="off"
          >
          <span class="username-display" id="username-display"></span>
          <button id="edit-username-btn" class="edit-btn" title="Edit username">✏️</button>
          <button id="save-username-btn" class="save-btn" title="Save username">✓</button>
        </div>
      </div>
      
      <div class="header-center">
        <div class="cooldown-container" id="cooldown-container">
          <div class="cooldown-timer">
            <svg class="cooldown-ring" viewBox="0 0 100 100">
              <circle class="cooldown-ring-bg" cx="50" cy="50" r="45"></circle>
              <circle class="cooldown-ring-fill" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="cooldown-text" id="cooldown-text">Ready!</span>
          </div>
        </div>
      </div>
      
      <div class="header-right">
        <div class="active-users" id="active-users">
          <span class="user-icon">👥</span>
          <span id="active-users-count">-</span>
        </div>
        <a href="stats.html" class="stats-link" title="View Statistics">📊</a>
      </div>
    </header>

    <!-- Canvas Container -->
    <main class="canvas-container" id="canvas-container">
      <canvas id="place-canvas" class="place-canvas"></canvas>
      
      <!-- Coordinates Display -->
      <div class="coordinates-display" id="coordinates-display">
        <span>X: <span id="coord-x">0</span></span>
        <span>Y: <span id="coord-y">0</span></span>
      </div>
      
      <!-- Zoom Controls -->
      <div class="zoom-controls">
        <button id="zoom-in-btn" class="zoom-btn" title="Zoom In">+</button>
        <button id="zoom-out-btn" class="zoom-btn" title="Zoom Out">−</button>
        <button id="zoom-reset-btn" class="zoom-btn" title="Reset Zoom">⟲</button>
      </div>
    </main>

    <!-- Color Palette -->
    <aside class="palette-container" id="palette-container">
      <div class="palette-header">
        <span>Colors</span>
      </div>
      <div class="palette" id="palette">
        <!-- Color swatches will be generated by JavaScript -->
      </div>
      <div class="selected-color-display">
        <span>Selected:</span>
        <div class="selected-color-preview" id="selected-color-preview"></div>
      </div>
    </aside>

    <!-- Activity Feed -->
    <aside class="activity-feed" id="activity-feed">
      <div class="activity-header">
        <h3>Recent Activity</h3>
        <button id="toggle-activity-btn" class="toggle-btn" title="Toggle Feed">◀</button>
      </div>
      <div class="activity-list" id="activity-list">
        <!-- Activity items will be added by JavaScript -->
      </div>
    </aside>

    <!-- Info Panel -->
    <aside class="info-panel" id="info-panel">
      <div class="info-item">
        <span class="info-label">Pixels placed:</span>
        <span class="info-value" id="session-pixels">0</span>
      </div>
      <div class="info-item">
        <span class="info-label">Canvas size:</span>
        <span class="info-value">256×256</span>
      </div>
      <div class="info-item">
        <span class="info-label">Cooldown:</span>
        <span class="info-value">2 min</span>
      </div>
    </aside>

    <!-- Mobile Controls (visible only on touch devices) -->
    <div class="mobile-controls" id="mobile-controls">
      <button id="mobile-palette-btn" class="mobile-btn">🎨</button>
      <button id="mobile-activity-btn" class="mobile-btn">📋</button>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Error Modal -->
  <div id="error-modal" class="modal">
    <div class="modal-content">
      <h2>Oops!</h2>
      <p id="error-message">Something went wrong.</p>
      <button class="modal-close-btn" onclick="closeErrorModal()">Close</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/fp.js"></script>
  <script src="js/behavior-tracker.js"></script>
  <script src="js/api.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLACE Admin Panel</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #333;
    }
    .login-form {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background: #1a1a1a;
      border-radius: 8px;
    }
    .login-form input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
    }
    .login-form button {
      width: 100%;
      padding: 12px;
      background: #0083C7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .login-form button:hover {
      background: #006aa3;
    }
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-card h3 {
      color: #888;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #fff;
    }
    .users-table {
      width: 100%;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 30px;
    }
    .users-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .users-table th,
    .users-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    .users-table th {
      background: #2a2a2a;
      color: #888;
      font-weight: 600;
      cursor: pointer;
    }
    .users-table th:hover {
      background: #333;
    }
    .users-table tr:hover {
      background: #252525;
    }
    .risk-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    .risk-human { background: #02BE01; color: #000; }
    .risk-likely_human { background: #94E044; color: #000; }
    .risk-suspicious { background: #E5D900; color: #000; }
    .risk-likely_bot { background: #E50000; color: #fff; }
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 0 4px;
      font-size: 12px;
    }
    .ban-btn { background: #E50000; color: white; }
    .unban-btn { background: #02BE01; color: #000; }
    .view-btn { background: #0083C7; color: white; }
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-bar select,
    .filter-bar input {
      padding: 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-content h2 {
      margin-bottom: 20px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }
    .detail-label {
      color: #888;
    }
    .detail-value {
      color: #fff;
      font-weight: bold;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .tool-card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
    }
    .tool-card h3 {
      margin-bottom: 15px;
    }
    .tool-card input,
    .tool-card button {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
    }
    .tool-card button {
      background: #0083C7;
      cursor: pointer;
    }
    .tool-card button:hover {
      background: #006aa3;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Login Form -->
    <div id="login-section" class="login-form">
      <h2>Admin Login</h2>
      <form id="admin-login-form">
        <input type="password" id="admin-password" placeholder="Enter admin password" required>
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-section" style="display: none;">
      <header class="admin-header">
        <h1>PLACE Admin Panel</h1>
        <div>
          <button onclick="logout()" class="action-btn" style="background: #444;">Logout</button>
        </div>
      </header>

      <!-- Stats Overview -->
      <div class="dashboard-grid">
        <div class="stat-card">
          <h3>Total Sessions</h3>
          <div class="value" id="stat-total-sessions">-</div>
        </div>
        <div class="stat-card">
          <h3>Flagged Users</h3>
          <div class="value" id="stat-flagged">-</div>
        </div>
        <div class="stat-card">
          <h3>Banned Users</h3>
          <div class="value" id="stat-banned">-</div>
        </div>
        <div class="stat-card">
          <h3>Active (24h)</h3>
          <div class="value" id="stat-active">-</div>
        </div>
      </div>

      <!-- Canvas Tools -->
      <div class="tools-grid">
        <div class="tool-card">
          <h3>Clear Pixel</h3>
          <input type="number" id="clear-x" placeholder="X (0-255)" min="0" max="255">
          <input type="number" id="clear-y" placeholder="Y (0-255)" min="0" max="255">
          <button onclick="clearPixel()">Clear Pixel</button>
        </div>
        <div class="tool-card">
          <h3>Fill Rectangle</h3>
          <input type="number" id="rect-x" placeholder="X (0-255)" min="0" max="255">
          <input type="number" id="rect-y" placeholder="Y (0-255)" min="0" max="255">
          <input type="number" id="rect-width" placeholder="Width" min="1" max="256">
          <input type="number" id="rect-height" placeholder="Height" min="1" max="256">
          <input type="number" id="rect-color" placeholder="Color (0-15)" min="0" max="15">
          <button onclick="fillRect()">Fill Rectangle</button>
        </div>
        <div class="tool-card">
          <h3>Export Logs</h3>
          <button onclick="exportLogs('all')">Export All Logs</button>
          <button onclick="exportLogs('flagged')">Export Flagged Only</button>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <select id="filter-risk" onchange="filterUsers()">
          <option value="all">All Risk Levels</option>
          <option value="human">Human (0-25)</option>
          <option value="likely_human">Likely Human (26-50)</option>
          <option value="suspicious">Suspicious (51-75)</option>
          <option value="likely_bot">Likely Bot (76-100)</option>
        </select>
        <select id="filter-status" onchange="filterUsers()">
          <option value="all">All Status</option>
          <option value="flagged">Flagged Only</option>
          <option value="banned">Banned Only</option>
        </select>
        <input type="text" id="search-username" placeholder="Search username..." oninput="filterUsers()">
        <button onclick="loadUsers()" class="action-btn" style="background: #0083C7;">Refresh</button>
      </div>

      <!-- Users Table -->
      <div class="users-table">
        <table>
          <thead>
            <tr>
              <th onclick="sortTable('username')">Username</th>
              <th onclick="sortTable('botScore')">Bot Score</th>
              <th onclick="sortTable('riskTier')">Risk</th>
              <th onclick="sortTable('totalPixels')">Pixels</th>
              <th onclick="sortTable('lastActive')">Last Active</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <!-- Rows will be added by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Session Details Modal -->
  <div id="session-modal" class="modal">
    <div class="modal-content">
      <h2>Session Details</h2>
      <div id="session-details"></div>
      <button class="action-btn" style="background: #444; margin-top: 20px;" onclick="closeSessionModal()">Close</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://place-backend-xyz.onrender.com';
    let adminToken = localStorage.getItem('adminToken');
    let allUsers = [];
    let currentSort = { field: 'botScore', direction: 'desc' };

    // Check if already logged in
    if (adminToken) {
      showDashboard();
    }

    // Login form handler
    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('admin-password').value;

      try {
        const response = await fetch(`${BACKEND_URL}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        const data = await response.json();

        if (data.success) {
          adminToken = data.token;
          localStorage.setItem('adminToken', adminToken);
          showDashboard();
        } else {
          alert('Invalid password');
        }
      } catch (error) {
        alert('Login failed: ' + error.message);
      }
    });

    function showDashboard() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('dashboard-section').style.display = 'block';
      loadUsers();
      loadStats();
    }

    function logout() {
      localStorage.removeItem('adminToken');
      location.reload();
    }

    async function loadUsers() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/admin/users`, {
          headers: { 'Authorization': `Bearer ${adminToken}` },
        });
        const data = await response.json();
        
        if (data.success) {
          allUsers = data.sessions;
          filterUsers();
        }
      } catch (error) {
        console.error('Error loading users:', error);
      }
    }

    async function loadStats() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/stats`);
        const data = await response.json();
        
        if (data.success) {
          document.getElementById('stat-total-sessions').textContent = data.stats.totalSessions;
          document.getElementById('stat-flagged').textContent = data.stats.botDetection.flagged;
          document.getElementById('stat-banned').textContent = data.stats.botDetection.banned;
          document.getElementById('stat-active').textContent = data.stats.activeSessions24h;
        }
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    function filterUsers() {
      const riskFilter = document.getElementById('filter-risk').value;
      const statusFilter = document.getElementById('filter-status').value;
      const searchTerm = document.getElementById('search-username').value.toLowerCase();

      let filtered = allUsers.filter(user => {
        // Risk filter
        if (riskFilter !== 'all' && user.riskTier !== riskFilter) return false;
        
        // Status filter
        if (statusFilter === 'flagged' && !user.flagged) return false;
        if (statusFilter === 'banned' && !user.banned) return false;
        
        // Search filter
        if (searchTerm && !user.username.toLowerCase().includes(searchTerm)) return false;
        
        return true;
      });

      // Sort
      filtered.sort((a, b) => {
        let aVal = a[currentSort.field];
        let bVal = b[currentSort.field];
        
        if (aVal === undefined || aVal === null) aVal = 0;
        if (bVal === undefined || bVal === null) bVal = 0;
        
        if (currentSort.direction === 'asc') {
          return aVal > bVal ? 1 : -1;
        } else {
          return aVal < bVal ? 1 : -1;
        }
      });

      renderUsers(filtered);
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-table-body');
      tbody.innerHTML = '';

      users.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(user.username || 'Anonymous')}</td>
          <td>${user.botScore || 0}</td>
          <td><span class="risk-badge risk-${user.riskTier || 'human'}">${user.riskTier || 'human'}</span></td>
          <td>${user.totalPixels || 0}</td>
          <td>${user.lastActive ? new Date(user.lastActive).toLocaleString() : 'Never'}</td>
          <td>
            <button class="action-btn view-btn" onclick="viewSession('${user.sessionId}')">View</button>
            ${user.banned ? 
              `<button class="action-btn unban-btn" onclick="unbanUser('${user.sessionId}')">Unban</button>` :
              `<button class="action-btn ban-btn" onclick="banUser('${user.sessionId}')">Ban</button>`
            }
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function sortTable(field) {
      if (currentSort.field === field) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.field = field;
        currentSort.direction = 'desc';
      }
      filterUsers();
    }

    async function banUser(sessionId) {
      if (!confirm('Ban this user?')) return;

      try {
        await fetch(`${BACKEND_URL}/api/admin/ban/${sessionId}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${adminToken}` },
        });
        loadUsers();
        loadStats();
      } catch (error) {
        alert('Failed to ban user');
      }
    }

    async function unbanUser(sessionId) {
      try {
        await fetch(`${BACKEND_URL}/api/admin/unban/${sessionId}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${adminToken}` },
        });
        loadUsers();
        loadStats();
      } catch (error) {
        alert('Failed to unban user');
      }
    }

    async function viewSession(sessionId) {
      const user = allUsers.find(u => u.sessionId === sessionId);
      if (!user) return;

      const details = document.getElementById('session-details');
      details.innerHTML = `
        <div class="detail-row"><span class="detail-label">Session ID:</span><span class="detail-value">${sessionId}</span></div>
        <div class="detail-row"><span class="detail-label">Username:</span><span class="detail-value">${escapeHtml(user.username || 'Anonymous')}</span></div>
        <div class="detail-row"><span class="detail-label">Bot Score:</span><span class="detail-value">${user.botScore || 0}</span></div>
        <div class="detail-row"><span class="detail-label">Risk Tier:</span><span class="detail-value">${user.riskTier || 'human'}</span></div>
        <div class="detail-row"><span class="detail-label">Total Pixels:</span><span class="detail-value">${user.totalPixels || 0}</span></div>
        <div class="detail-row"><span class="detail-label">First Seen:</span><span class="detail-value">${user.firstSeen ? new Date(user.firstSeen).toLocaleString() : 'N/A'}</span></div>
        <div class="detail-row"><span class="detail-label">Last Active:</span><span class="detail-value">${user.lastActive ? new Date(user.lastActive).toLocaleString() : 'N/A'}</span></div>
        <div class="detail-row"><span class="detail-label">Flagged:</span><span class="detail-value">${user.flagged ? 'Yes' : 'No'}</span></div>
        <div class="detail-row"><span class="detail-label">Banned:</span><span class="detail-value">${user.banned ? 'Yes' : 'No'}</span></div>
        <div class="detail-row"><span class="detail-label">User Agent:</span><span class="detail-value" style="font-size: 11px; word-break: break-all;">${user.userAgent || 'N/A'}</span></div>
      `;

      document.getElementById('session-modal').classList.add('active');
    }

    function closeSessionModal() {
      document.getElementById('session-modal').classList.remove('active');
    }

    async function clearPixel() {
      const x = parseInt(document.getElementById('clear-x').value);
      const y = parseInt(document.getElementById('clear-y').value);

      if (isNaN(x) || isNaN(y) || x < 0 || x > 255 || y < 0 || y > 255) {
        alert('Please enter valid coordinates (0-255)');
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/api/admin/clear-pixel`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}` 
          },
          body: JSON.stringify({ x, y }),
        });

        const data = await response.json();
        if (data.success) {
          alert('Pixel cleared');
        } else {
          alert('Failed: ' + data.error);
        }
      } catch (error) {
        alert('Failed to clear pixel');
      }
    }

    async function fillRect() {
      const x = parseInt(document.getElementById('rect-x').value);
      const y = parseInt(document.getElementById('rect-y').value);
      const width = parseInt(document.getElementById('rect-width').value);
      const height = parseInt(document.getElementById('rect-height').value);
      const color = parseInt(document.getElementById('rect-color').value);

      if ([x, y, width, height, color].some(isNaN)) {
        alert('Please fill all fields');
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/api/admin/fill-rect`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}` 
          },
          body: JSON.stringify({ x, y, width, height, color }),
        });

        const data = await response.json();
        if (data.success) {
          alert('Rectangle filled');
        } else {
          alert('Failed: ' + data.error);
        }
      } catch (error) {
        alert('Failed to fill rectangle');
      }
    }

    async function exportLogs(filter) {
      try {
        const url = filter === 'flagged' 
          ? `${BACKEND_URL}/api/admin/export-logs?flaggedOnly=true`
          : `${BACKEND_URL}/api/admin/export-logs`;

        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${adminToken}` },
        });

        const data = await response.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url2 = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url2;
        a.download = `place-logs-${filter}-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url2);
      } catch (error) {
        alert('Failed to export logs');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
